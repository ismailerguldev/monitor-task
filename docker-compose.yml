services:
  frontend:
    build: ./frontend
    ports:
      - 3000:3000
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:5000/api
  backend:
    build: ./backend
    ports:
      - 5000:5000
    environment:
      - DATABASE_URL=postgres://postgres:secret_postgres_password@database:5432/postgres?sslmode=disable
      - JWT_SECRET=fenasal_gizli_jwt_secret
      - NODE_ENV=development
      - PORT=5000
    depends_on:
      - database
  database:
    image: postgres:18-alpine
    container_name: postgres_db
    restart: always
    environment:
      - POSTGRES_PASSWORD=secret_postgres_password
    ports:
      - 5432:5432
    volumes:
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
    